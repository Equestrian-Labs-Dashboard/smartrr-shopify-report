<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corro — Shopify & Smartrr Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f6f8;--card:#fff;--text:#171717;--muted:#6b7280;--border:#e5e7eb;--accent:#4f46e5;--success:#15803d;--warning:#b45309;--danger:#b91c1c}
[data-theme="dark"]{--bg:#0f1117;--card:#1a1d27;--text:#f3f4f6;--muted:#9ca3af;--border:#2b2f3a;--accent:#818cf8;--success:#4ade80;--warning:#fbbf24;--danger:#f87171}
*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 32px;border-bottom:1px solid var(--border)}h1{font-size:21px;margin:0}.subtitle{font-size:13px;color:var(--muted);margin-top:5px}
button,select,input{font:inherit}.theme{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:8px;cursor:pointer}
main{max-width:1320px;margin:auto;padding:24px 32px}.tabs{display:flex;gap:8px;margin-bottom:18px}.tab{padding:9px 16px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:9px;cursor:pointer}.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}input,select{background:var(--card);color:var(--text);border:1px solid var(--border);padding:9px 12px;border-radius:8px}input{flex:1;min-width:240px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}.card,.panel{background:var(--card);border:1px solid var(--border);border-radius:12px}.card{padding:18px}.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.value{font-size:26px;font-weight:700;margin-top:6px}.panel{padding:18px;margin-bottom:20px}.chart{height:280px}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px}table{width:100%;border-collapse:collapse;background:var(--card);font-size:13px}th,td{text-align:left;padding:10px 13px;border-bottom:1px solid var(--border);white-space:nowrap}th{font-size:11px;text-transform:uppercase;color:var(--muted)}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600}.active{background:rgba(21,128,61,.13);color:var(--success)}.paused{background:rgba(180,83,9,.13);color:var(--warning)}.cancelled{background:rgba(185,28,28,.13);color:var(--danger)}.unknown{background:rgba(107,114,128,.13);color:var(--muted)}
.empty{padding:55px 20px;text-align:center;color:var(--muted)}code{background:var(--card);border:1px solid var(--border);padding:2px 5px;border-radius:4px}
@media(max-width:700px){header,main{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<header><div><h1>Shopify & Smartrr Report</h1><div class="subtitle" id="lastUpdated">Loading data…</div></div><button class="theme" id="themeToggle">Dark mode</button></header>
<main>
  <div class="tabs"><button class="tab active" data-view="orders">Orders</button><button class="tab" data-view="subscriptions">Subscriptions</button></div>
  <div id="content"><div class="empty">Loading…</div></div>
</main>
<script>
const URLS={orders:"data/orders_report.json",subscriptions:"data/subscriptions_report.json"};
const state={view:"orders",orders:[],subscriptions:[],text:"",year:"all",status:"all"};
let chart;
const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
const money=(v,currency="USD")=>{const n=Number(v);return Number.isFinite(n)?new Intl.NumberFormat("en-US",{style:"currency",currency:currency||"USD"}).format(n):"—"};
const date=v=>{const d=new Date(v);return v&&!Number.isNaN(d)?d.toLocaleDateString("en-US"):"—"};
const yearOf=v=>{const d=new Date(v);return Number.isNaN(d)?"unknown":String(d.getFullYear())};
function statusClass(v){const s=String(v||"").toLowerCase();if(s.includes("active"))return"active";if(s.includes("pause"))return"paused";if(s.includes("cancel"))return"cancelled";return"unknown"}
async function load(){
  const results=await Promise.all(Object.entries(URLS).map(async([key,url])=>{try{const r=await fetch(`${url}?v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`${r.status}`);return[key,await r.json(),null]}catch(e){return[key,[],e]}}));
  const errors=[];for(const[key,data,error]of results){state[key]=Array.isArray(data)?data:[];if(error)errors.push(`${URLS[key]} (${error.message})`)}
  if(errors.length===2){document.getElementById("content").innerHTML=`<div class="empty">No report data is available yet.<br><br>Run <strong>Subscriptions ETL</strong> in GitHub Actions and verify these files exist:<br><code>${errors.join("</code><br><code>")}</code></div>`;document.getElementById("lastUpdated").textContent="No data";return}
  render();
}
function ordersView(){
 const years=[...new Set(state.orders.map(r=>yearOf(r.created_at)).filter(y=>y!=="unknown"))].sort((a,b)=>b-a);
 const rows=state.orders.filter(r=>(state.year==="all"||yearOf(r.created_at)===state.year)&&(!state.text||JSON.stringify(r).toLowerCase().includes(state.text.toLowerCase())));
 const revenue=rows.reduce((s,r)=>s+(Number(r.total_price)||0),0);const customers=new Set(rows.map(r=>r.customer_email).filter(Boolean)).size;
 return `<div class="controls"><input id="search" placeholder="Search orders by customer, order ID, status…" value="${esc(state.text)}"><select id="year"><option value="all">All years</option>${years.map(y=>`<option ${state.year===y?"selected":""}>${y}</option>`).join("")}</select></div>
 <div class="cards"><div class="card"><div class="label">Unique orders</div><div class="value">${rows.length}</div></div><div class="card"><div class="label">Unique customers</div><div class="value">${customers}</div></div><div class="card"><div class="label">Order revenue</div><div class="value">${money(revenue,rows[0]?.currency)}</div></div></div>
 <div class="panel chart"><canvas id="chart"></canvas></div>
 <div class="table-wrap"><table><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Financial status</th><th>Fulfillment</th><th>Created</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.order_name||r.order_id)}</td><td>${esc(r.customer_email||"—")}</td><td>${money(r.total_price,r.currency)}</td><td>${esc(r.financial_status||"—")}</td><td>${esc(r.fulfillment_status||"—")}</td><td>${date(r.created_at)}</td></tr>`).join("")}</tbody></table></div>`;
}
function subscriptionsView(){
 const rows=state.subscriptions.filter(r=>(state.status==="all"||statusClass(r.status)===state.status)&&(!state.text||JSON.stringify(r).toLowerCase().includes(state.text.toLowerCase())));
 const customers=new Set(rows.map(r=>r.customer_email).filter(Boolean)).size;const active=rows.filter(r=>statusClass(r.status)==="active").length;
 return `<div class="controls"><input id="search" placeholder="Search subscriptions by customer, subscription ID, plan…" value="${esc(state.text)}"><select id="status"><option value="all">All statuses</option><option value="active" ${state.status==="active"?"selected":""}>Active</option><option value="paused" ${state.status==="paused"?"selected":""}>Paused</option><option value="cancelled" ${state.status==="cancelled"?"selected":""}>Cancelled</option><option value="unknown" ${state.status==="unknown"?"selected":""}>Unknown</option></select></div>
 <div class="cards"><div class="card"><div class="label">Unique subscriptions</div><div class="value">${rows.length}</div></div><div class="card"><div class="label">Active subscriptions</div><div class="value">${active}</div></div><div class="card"><div class="label">Customers</div><div class="value">${customers}</div></div></div>
 <div class="panel chart"><canvas id="chart"></canvas></div>
 <div class="table-wrap"><table><thead><tr><th>Subscription ID</th><th>Customer</th><th>Status</th><th>Next order date</th><th>Plan ID</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.subscription_id||"—")}</td><td>${esc(r.customer_email||"—")}</td><td><span class="badge ${statusClass(r.status)}">${esc(r.status||"unknown")}</span></td><td>${date(r.next_order_date)}</td><td>${esc(r.plan_id||"—")}</td></tr>`).join("")}</tbody></table></div>`;
}
function draw(){if(chart)chart.destroy();const canvas=document.getElementById("chart");if(!canvas)return;if(state.view==="orders"){const counts={};state.orders.filter(r=>state.year==="all"||yearOf(r.created_at)===state.year).forEach(r=>{const k=r.financial_status||"unknown";counts[k]=(counts[k]||0)+1});chart=new Chart(canvas,{type:"bar",data:{labels:Object.keys(counts),datasets:[{data:Object.values(counts),borderRadius:6}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:"Orders by financial status"}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}else{const counts={active:0,paused:0,cancelled:0,unknown:0};state.subscriptions.forEach(r=>counts[statusClass(r.status)]++);chart=new Chart(canvas,{type:"bar",data:{labels:["Active","Paused","Cancelled","Unknown"],datasets:[{data:Object.values(counts),borderRadius:6}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:"Subscriptions by status"}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}}
function render(){document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view));document.getElementById("content").innerHTML=state.view==="orders"?ordersView():subscriptionsView();document.getElementById("search")?.addEventListener("input",e=>{state.text=e.target.value;render()});document.getElementById("year")?.addEventListener("change",e=>{state.year=e.target.value;render()});document.getElementById("status")?.addEventListener("change",e=>{state.status=e.target.value;render()});const stamps=[...state.orders,...state.subscriptions].map(r=>new Date(r.report_updated_at)).filter(d=>!Number.isNaN(d));document.getElementById("lastUpdated").textContent=stamps.length?`Last updated ${new Date(Math.max(...stamps)).toLocaleString("en-US")}`:"Report loaded";draw()}
document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{state.view=b.dataset.view;state.text="";render()}));
const theme=document.getElementById("themeToggle");function setTheme(v){document.documentElement.dataset.theme=v;theme.textContent=v==="dark"?"Light mode":"Dark mode";localStorage.setItem("report-theme",v)}theme.addEventListener("click",()=>setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));setTheme(localStorage.getItem("report-theme")||"light");load();
</script>
</body>
</html>
