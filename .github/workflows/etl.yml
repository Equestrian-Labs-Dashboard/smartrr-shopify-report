name: Subscriptions ETL

on:
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC — change the "1" for a different weekday
  workflow_dispatch: {}     # "Run workflow" button in GitHub UI for on-demand runs

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # fail fast instead of hanging silently if something's wrong

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          PYTHONUNBUFFERED: "1"   # makes print() show up live in the Actions log
          SHOPIFY_STORE_DOMAIN: ${{ vars.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION }}
          ORDERS_LOOKBACK_DAYS: ${{ vars.ORDERS_LOOKBACK_DAYS }}   # optional, defaults to 90
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SMARTRR_ACCESS_TOKEN: ${{ secrets.SMARTRR_ACCESS_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python src/main.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update subscriptions report [automated]"
          git push
